<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Batman: Gotham Rooftops por LeoClates</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050510;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        #retro-header {
            background: #000;
            border-bottom: 3px double #ffff00;
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            z-index: 15;
        }
        #retro-header h1 {
            font-size: 18px;
            color: #ffff00;
            text-shadow: 2px 2px #333;
            letter-spacing: 2px;
            font-weight: bold;
        }
        #retro-header .credito {
            font-size: 11px;
            color: #aaaaaa;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #hud {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            padding: 6px 12px;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.9);
            font-weight: bold;
            border-bottom: 1px solid #ffff00;
            z-index: 15;
        }
        .hud-linea {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #status-txt {
            grid-column: 1 / -1;
            text-align: center;
            color: #ffff00;
            border-top: 1px dashed #333;
            padding-top: 3px;
            margin-top: 3px;
            font-size: 12px;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
            background: #050510;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: bottom center;
        }

        #controles-tactiles {
            background: #000;
            border-top: 4px solid #ffff00;
            padding: 10px 10px 20px 10px;
            display: grid;
            grid-template-columns: 1fr 1.1fr 1fr;
            gap: 10px;
            min-height: 135px;
            z-index: 15;
        }

        .columna-control {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        .label-control {
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            font-weight: bold;
        }

        .valor-control {
            font-size: 20px;
            font-weight: bold;
            color: #ffff00;
        }

        .botones-ajuste {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .btn-accion {
            flex: 1;
            padding: 10px 0;
            font-size: 20px;
            font-weight: bold;
            background: #151515;
            color: #ffff00;
            border: 2px solid #ffff00;
            border-radius: 6px;
            touch-action: manipulation;
        }
        .btn-accion:active {
            background: #ffff00;
            color: #000;
        }

        .btn-fuego {
            width: 100%;
            height: 85%;
            background: #222222;
            color: #ffff00;
            border: 3px solid #ffff00;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            touch-action: manipulation;
            box-shadow: inset -2px -2px #000;
        }
        .btn-fuego:active {
            background: #ffff00;
            color: #000;
            box-shadow: none;
        }

        @media (orientation: landscape) {
            #retro-header {
                flex-direction: row;
                justify-content: space-between;
                padding: 4px 15px;
            }
            #retro-header h1 { font-size: 15px; }
            #retro-header .credito { font-size: 10px; }
            #controles-tactiles {
                min-height: 115px;
                padding: 5px 10px 10px 10px;
            }
            .btn-accion { padding: 6px 0; }
        }
    </style>
</head>
<body>

    <div id="retro-header">
        <h1>BATMAN: GOTHAM ROOFTOPS</h1>
        <div class="credito">BY LEOCLATES</div>
    </div>

    <div id="hud">
        <div class="hud-linea">TIROS: <span id="marcador-bananas"></span></div>
        <div class="hud-linea" style="justify-content: flex-end; gap: 5px;">VIDAS: <span id="marcador-vidas">❤️❤️❤️</span></div>
        <div class="hud-linea">SCORE: <span id="marcador-score" style="color: #ffff00;">0000</span></div>
        <div class="hud-linea" style="justify-content: flex-end;">HI-SCORE: <span id="marcador-hiscore" style="color: #54ffff;">1000</span></div>
        <div id="status-txt">CARGANDOS SISTEMAS DE BATI-RASTREO...</div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controles-tactiles">
        <div class="columna-control">
            <div class="label-control">Ángulo</div>
            <div id="angulo-val" class="valor-control">45°</div>
            <div class="botones-ajuste">
                <button class="btn-accion" onclick="ajustar('angulo', -1)">-</button>
                <button class="btn-accion" onclick="ajustar('angulo', 1)">+</button>
            </div>
        </div>

        <div class="columna-control">
            <button class="btn-fuego" onclick="lanzarBanana()">¡LANZA!</button>
        </div>

        <div class="columna-control">
            <div class="label-control">Velocidad</div>
            <div id="velocidad-val" class="valor-control">40</div>
            <div class="botones-ajuste">
                <button class="btn-accion" onclick="ajustar('velocidad', -1)">-</button>
                <button class="btn-accion" onclick="ajustar('velocidad', 1)">+</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const container = document.getElementById("canvas-container");

        // Audio
        let audioCtx = null;
        function iniciarAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function sonarRetro(frecuenciaInicial, frecuenciaFinal, duracion, tipo = 'square') {
            try {
                if (!audioCtx) return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = tipo;
                osc.frequency.setValueAtTime(frecuenciaInicial, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(frecuenciaFinal, audioCtx.currentTime + duracion);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duracion);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duracion);
            } catch(e) {}
        }

        // Carga de imágenes
        const imgBatmanQuieto = new Image(); imgBatmanQuieto.src = 'batman_quieto.png';
        const imgBatmanLanza = new Image(); imgBatmanLanza.src = 'batman_lanza.png';
        const imgBatarang = new Image(); imgBatarang.src = 'batarang.png';
        const imgVillanoDerrotado = new Image(); imgVillanoDerrotado.src = 'villano_derrotado.png';

        const rutasVillanos = ['villano1.png', 'villano2.png', 'villano3.png', 'villano4.png'];
        const imgVillanoActual = new Image();

        let score = 0;
        let hiscore = 1000;
        let vidas = 3;       
        let intentos = 5;    
        let gameOver = false;
        let activosCargados = false; // Seguro para el arranque controlado

        let angulo = 45;
        let velocidad = 40; 
        let edificios = [];
        let bloqueado = false;
        
        let indiceEdificioJugador = 0;
        let indiceEdificioObjetivo = 2;

        let jugador = { x: 0, y: 0, ancho: 40, alto: 40, estado: 'quieto' };
        let objetivo = { x: 0, y: 0, ancho: 40, alto: 40, estado: 'vivo' };
        let banana = { x: 0, y: 0, vx: 0, vy: 0, activa: false, anguloRotacion: 0 };
        const gravedad = 0.15;

        let ultimoImpacto = { x: null, y: null, visible: false };

        function rotarVillano() {
            const indiceAzar = Math.floor(Math.random() * rutasVillanos.length);
            imgVillanoActual.src = rutasVillanos[indiceAzar];
        }

        function redimensionarCanvas() {
            if (!container || !activosCargados) return;
            canvas.width = container.clientWidth || window.innerWidth;
            canvas.height = container.clientHeight || 300;
            
            if (edificios.length === 0) {
                generarCiudad();
            } else {
                reubicarPersonajes();
            }
            dibujar();
        }

        function generarCiudad() {
            edificios = [];
            let xActual = 0;
            const minAncho = 45; 
            const maxAncho = 70;

            while (xActual < canvas.width) {
                let anchoEdificio = Math.floor(Math.random() * (maxAncho - minAncho)) + minAncho;
                let altoEdificio = Math.floor(Math.random() * (canvas.height * 0.5)) + (canvas.height * 0.15);
                
                if (xActual + anchoEdificio > canvas.width) {
                    anchoEdificio = canvas.width - xActual;
                }

                edificios.push({
                    x: xActual,
                    y: canvas.height - altoEdificio,
                    ancho: anchoEdificio,
                    alto: altoEdificio
                });
                xActual += anchoEdificio;
            }

            if (edificios.length > 3) {
                indiceEdificioJugador = Math.floor(Math.random() * Math.min(3, edificios.length - 3));
                let minIndicesFaltantes = indiceEdificioJugador + 3;
                let rangoDisponible = edificios.length - minIndicesFaltantes;
                indiceEdificioObjetivo = minIndicesFaltantes + Math.floor(Math.random() * rangoDisponible);
                
                if (indiceEdificioObjetivo >= edificios.length) {
                    indiceEdificioObjetivo = edificios.length - 1;
                }
            }
            reubicarPersonajes();
        }

        function reubicarPersonajes() {
            if (edificios.length > indiceEdificioObjetivo && edificios[indiceEdificioJugador]) {
                let eJugador = edificios[indiceEdificioJugador];
                jugador.x = eJugador.x + (eJugador.ancho / 2) - 20;
                jugador.y = eJugador.y - 40;

                let eObjetivo = edificios[indiceEdificioObjetivo];
                objetivo.x = eObjetivo.x + (eObjetivo.ancho / 2) - 20;
                objetivo.y = eObjetivo.y - 40;
            }
        }

        function dibujar() {
            if (!ctx || !activosCargados) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#ff0000";
                ctx.font = "bold 32px 'Courier New', monospace";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = "#ffff00";
                ctx.font = "bold 13px 'Courier New', monospace";
                ctx.fillText("TOCA LA PANTALLA PARA REINICIAR", canvas.width / 2, canvas.height / 2 + 20);
                
                ctx.textAlign = "left";
                return;
            }

            ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
            ctx.font = "bold 11px monospace";
            ctx.fillText("▲ RASTREADOR: CORRIGE USANDO EL PUNTO ROJO ANTERIOR", 15, 20);

            // Edificios
            ctx.fillStyle = "rgba(40, 44, 52, 0.95)";
            edificios.forEach(e => {
                ctx.fillRect(e.x, e.y, e.ancho, e.alto);
            });

            // Marca de impacto
            if (ultimoImpacto.visible) {
                ctx.fillStyle = "#ff0000";
                ctx.fillRect(ultimoImpacto.x - 6, ultimoImpacto.y - 6, 12, 12);
                ctx.strokeStyle = "#ffffff";
                ctx.strokeRect(ultimoImpacto.x - 6, ultimoImpacto.y - 6, 12, 12);
            }

            // Batman
            let imgActual = (jugador.estado === 'lanza') ? imgBatmanLanza : imgBatmanQuieto;
            if (imgActual.complete && imgActual.naturalWidth !== 0) {
                ctx.drawImage(imgActual, jugador.x, jugador.y, jugador.ancho, jugador.alto);
            } else {
                ctx.fillStyle = "#1a237e";
                ctx.fillRect(jugador.x, jugador.y, jugador.ancho, jugador.alto);
            }

            // Villano (MODIFICADO: Si no carga la imagen, dibuja un misterioso cuadro con signo de interrogación)
            let imgRival = (objetivo.estado === 'derrotado') ? imgVillanoDerrotado : imgVillanoActual;
            if (imgRival.complete && imgRival.naturalWidth !== 0) {
                ctx.drawImage(imgRival, objetivo.x, objetivo.y, objetivo.ancho, objetivo.alto);
            } else {
                ctx.fillStyle = "#000000";
                ctx.fillRect(objetivo.x, objetivo.y, objetivo.ancho, objetivo.alto);
                ctx.strokeStyle = "#ffff00";
                ctx.lineWidth = 2;
                ctx.strokeRect(objetivo.x, objetivo.y, objetivo.ancho, objetivo.alto);
                
                ctx.fillStyle = "#ffff00";
                ctx.font = "bold 20px monospace";
                ctx.fillText("?", objetivo.x + 14, objetivo.y + 26);
            }

            // Batarang
            if (banana.activa) {
                if (imgBatarang.complete && imgBatarang.naturalWidth !== 0) {
                    ctx.save();
                    ctx.translate(banana.x, banana.y);
                    ctx.rotate(banana.anguloRotacion);
                    ctx.drawImage(imgBatarang, -20, -20, 40, 40);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.translate(banana.x, banana.y);
                    ctx.rotate(banana.anguloRotacion);
                    ctx.fillStyle = "#ffff00";
                    ctx.fillRect(-15, -6, 30, 12);
                    ctx.restore();
                }
            }
        }

        function ajustar(tipo, valor) {
            if (bloqueado || gameOver || !activosCargados) return;
            iniciarAudio();
            sonarRetro(420, 420, 0.04, 'triangle');
            if (tipo === 'angulo') {
                angulo = Math.max(0, Math.min(90, angulo + valor));
                document.getElementById("angulo-val").innerText = angulo + "°";
            } else if (tipo === 'velocidad') {
                velocidad = Math.max(10, Math.min(120, velocidad + valor));
                document.getElementById("velocidad-val").innerText = velocidad;
            }
            dibujar();
        }

        function lanzarBanana() {
            if (banana.activa || bloqueado || gameOver || !activosCargados) return;
            iniciarAudio();

            banana.activa = true;
            jugador.estado = 'lanza';
            document.getElementById("status-txt").innerText = "¡BATARANG EN VUELO!";
            
            sonarRetro(200, 700, 0.25, 'triangle');

            const radianes = (angulo * Math.PI) / 180;
            banana.x = jugador.x + 20;
            banana.y = jugador.y - 15; 
            
            const escalaFisica = canvas.width * 0.00028;
            banana.vx = Math.cos(radianes) * velocidad * escalaFisica;
            banana.vy = -Math.sin(radianes) * velocidad * escalaFisica;
            banana.anguloRotacion = 0;

            actualizarFisica();
        }

        function actualizarFisica() {
            if (!banana.activa) return;

            banana.x += banana.vx;
            banana.vy += gravedad;
            banana.y += banana.vy;
            banana.anguloRotacion += 0.22;

            if (banana.x < 0 || banana.x > canvas.width || banana.y > canvas.height) {
                ultimoImpacto.visible = false;
                procesarFallo();
                return;
            }

            if (detectarColision(banana, objetivo)) {
                banana.activa = false;
                bloqueado = true;
                objetivo.estado = 'derrotado';
                ultimoImpacto.visible = false;
                
                score += 100; 
                actualizarMarcadoresVisuales();
                
                dibujar();
                sonarRetro(350, 60, 1.1, 'sawtooth');
                document.getElementById("status-txt").innerText = "💥 ¡AMENAZA NEUTRALIZADA! +100 PTS 💥";
                
                setTimeout(() => {
                    bloqueado = false;
                    edificios = []; 
                    intentos = 5; 
                    reiniciarRondaDinamica();
                }, 2500);
                return;
            }

            for (let e of edificios) {
                if (banana.x > e.x && banana.x < e.x + e.ancho && banana.y > e.y) {
                    sonarRetro(130, 60, 0.15, 'triangle');
                    ultimoImpacto.x = banana.x;
                    ultimoImpacto.y = banana.y;
                    ultimoImpacto.visible = true;
                    
                    score = Math.max(0, score - 20); 
                    actualizarMarcadoresVisuales();

                    procesarFallo();
                    return;
                }
            }

            dibujar();
            requestAnimationFrame(actualizarFisica);
        }

        function detectarColision(b, obj) {
            if (obj.estado === 'derrotado') return false;
            return b.x > obj.x - 6 && b.x < obj.x + obj.ancho + 6 && b.y > obj.y - 6 && b.y < obj.y + obj.alto + 6;
        }

        function procesarFallo() {
            banana.activa = false;
            jugador.estado = 'quieto';
            intentos--;
            actualizarHUD();

            if (intentos <= 0) {
                bloqueado = true;
                vidas--; 
                actualizarMarcadoresVisuales();

                if (vidas <= 0) {
                    gameOver = true;
                    if (score > hiscore) hiscore = score;
                    actualizarMarcadoresVisuales();
                    dibujar();
                    sonarRetro(120, 30, 1.5, 'square');
                } else {
                    document.getElementById("status-txt").innerText = "¡ZONA COPADA! PERDISTE UNA VIDA 💥";
                    sonarRetro(100, 50, 1.0, 'square');
                    setTimeout(() => {
                        bloqueado = false;
                        edificios = [];
                        intentos = 5; 
                        reiniciarRondaDinamica();
                    }, 2000);
                }
            } else {
                document.getElementById("status-txt").innerText = "ERROR, RECALCULA"; 
                dibujar();
            }
        }

        function reiniciarRondaDinamica() {
            banana.activa = false;
            jugador.estado = 'quieto';
            objetivo.estado = 'vivo';
            ultimoImpacto.visible = false;
            rotarVillano(); 
            actualizarHUD();
            if(!gameOver) document.getElementById("status-txt").innerText = "¡NUEVO OBJETIVO EN JUEGO! APUNTA";
            redimensionarCanvas();
        }

        function reiniciarJuegoCompletoDesdeCero() {
            score = 0;
            vidas = 3;
            intentos = 5;
            gameOver = false;
            bloqueado = false;
            edificios = [];
            actualizarMarcadoresVisuales();
            reiniciarRondaDinamica();
        }

        function actualizarHUD() {
            const contenedor = document.getElementById("marcador-bananas");
            if (!contenedor) return;
            let textoBananas = "";
            for(let i = 0; i < 5; i++) {
                textoBananas += (i < intentos) ? "🦇" : "💩";
            }
            contenedor.innerHTML = textoBananas;
        }

        function actualizarMarcadoresVisuales() {
            document.getElementById("marcador-score").innerText = String(score).padStart(4, '0');
            document.getElementById("marcador-hiscore").innerText = String(hiscore).padStart(4, '0');
            
            let textoVidas = "";
            for(let v = 0; v < 3; v++) {
                textoVidas += (v < vidas) ? "❤️" : "🖤";
            }
            document.getElementById("marcador-vidas").innerText = textoVidas;
        }

        canvas.addEventListener('click', () => {
            if (gameOver) reiniciarJuegoCompletoDesdeCero();
        });
        canvas.addEventListener('touchstart', (e) => {
            if (gameOver) {
                e.preventDefault();
                reiniciarJuegoCompletoDesdeCero();
            }
        });

        window.addEventListener('resize', redimensionarCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(redimensionarCanvas, 300);
        });

        // NUEVO: Sistema de inicialización controlada que espera la carga del sistema
        rotarVillano();
        
        window.addEventListener('load', () => {
            activosCargados = true;
            document.getElementById("status-txt").innerText = "AJUSTA TUS COORDENADAS Y ¡LANZA!";
            actualizarMarcadoresVisuales();
            redimensionarCanvas();
        });

        // Respaldo de seguridad por si el evento 'load' tarda demasiado en redes móviles
        setTimeout(() => {
            if (!activosCargados) {
                activosCargados = true;
                document.getElementById("status-txt").innerText = "AJUSTA TUS COORDENADAS Y ¡LANZA!";
                actualizarMarcadoresVisuales();
                redimensionarCanvas();
            }
        }, 1200);

        function alCargar() {
            if(activosCargados) {
                actualizarHUD();
                dibujar();
            }
        }
        imgBatmanQuieto.onload = alCargar;
        imgBatmanLanza.onload = alCargar;
        imgVillanoDerrotado.onload = alCargar;
        imgBatarang.onload = alCargar;
        imgVillanoActual.onload = alCargar;
    </script>
</body>
</html>
